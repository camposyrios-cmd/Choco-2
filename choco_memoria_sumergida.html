    animation: pulse 2.8s ease-in-out infinite;

const gadget = document.getElementById('gadget');
const nodesLayer = document.getElementById('nodes-layer');
const canvas = document.getElementById('canvas-fog');
const ctx = canvas.getContext('2d');
const panel = document.getElementById('panel');
const revealedCountEl = document.getElementById('revealed-count');
const totalCountEl = document.getElementById('total-count');

let isDrawing = false;
let revealedNodes = new Set();
let nodeElements = [];
let positions = [];
let shuffledEvents = [];

function seededShuffle(arr, seed) {
  const a = [...arr];
  let s = seed;
  for (let i = a.length - 1; i > 0; i--) {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    const j = Math.abs(s) % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function resize() {
  const w = gadget.offsetWidth;
  const h = gadget.offsetHeight;
  canvas.width = w;
  canvas.height = h;
  drawFog();
  positionNodes(w, h);
}

function drawFog() {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = 'rgba(4, 14, 22, 0.9)';
  ctx.fillRect(0, 0, w, h);
}

function positionNodes(w, h) {
  nodesLayer.innerHTML = '';
  nodeElements = [];
  positions = [];
  revealedNodes = new Set();
  revealedCountEl.textContent = '0';

  shuffledEvents = seededShuffle(events, 42);

  const margin = 50;
  const usableW = w - margin * 2;
  const usableH = h - margin * 2;
  const total = shuffledEvents.length;
  const cols = Math.ceil(Math.sqrt(total * (usableW / usableH)));
  const rows = Math.ceil(total / cols);
  const cellW = usableW / cols;
  const cellH = usableH / rows;

  shuffledEvents.forEach((ev, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const jx = (Math.random() - 0.5) * cellW * 0.55;
    const jy = (Math.random() - 0.5) * cellH * 0.55;
    const x = Math.max(margin, Math.min(w - margin, margin + col * cellW + cellW / 2 + jx));
    const y = Math.max(margin, Math.min(h - margin, margin + row * cellH + cellH / 2 + jy));

    positions.push({x, y});

    const node = document.createElement('div');
    node.className = 'node';
    node.style.left = x + 'px';
    node.style.top = y + 'px';
    node.dataset.index = i;

    const dot = document.createElement('div');
    dot.className = 'node-dot';
    const yr = document.createElement('div');
    yr.className = 'node-year';
    yr.textContent = ev.year;

    node.appendChild(dot);
    node.appendChild(yr);
    node.addEventListener('click', () => {
      if (revealedNodes.has(i)) openPanel(ev);
    });
    nodesLayer.appendChild(node);
    nodeElements.push(node);
  });

  totalCountEl.textContent = total;
}

function openPanel(ev) {
  document.getElementById('panel-year').textContent = ev.year;
  document.getElementById('panel-title').textContent = ev.title;
  document.getElementById('panel-link').href = ev.link;
  panel.classList.add('open');
}

function closePanel() {
  panel.classList.remove('open');
}

function revealAll() {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  positions.forEach((pos, i) => {
    if (!revealedNodes.has(i)) {
      revealedNodes.add(i);
      nodeElements[i].classList.add('revealed');
    }
  });
  revealedCountEl.textContent = revealedNodes.size;
  document.getElementById('hint').style.opacity = '0';
}

function reveal(x, y) {
  ctx.globalCompositeOperation = 'destination-out';
  const r = 45;
  const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
  grad.addColorStop(0, 'rgba(0,0,0,1)');
  grad.addColorStop(0.55, 'rgba(0,0,0,0.85)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalCompositeOperation = 'source-over';

  positions.forEach((pos, i) => {
    const dx = pos.x - x, dy = pos.y - y;
    if (Math.sqrt(dx * dx + dy * dy) < r + 8 && !revealedNodes.has(i)) {
      revealedNodes.add(i);
      nodeElements[i].classList.add('revealed');
      revealedCountEl.textContent = revealedNodes.size;
      if (revealedNodes.size >= 4) document.getElementById('hint').style.opacity = '0';
    }
  });
}

function getPos(e) {
  const rect = gadget.getBoundingClientRect();
  if (e.touches) return {x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top};
  return {x: e.clientX - rect.left, y: e.clientY - rect.top};
}

let lastX = 0, lastY = 0;

gadget.addEventListener('mousedown', e => {
  isDrawing = true;
  const p = getPos(e); lastX = p.x; lastY = p.y;
  reveal(p.x, p.y);
});
gadget.addEventListener('mouseup', () => isDrawing = false);
gadget.addEventListener('mouseleave', () => isDrawing = false);
gadget.addEventListener('mousemove', e => {
  if (!isDrawing) return;
  const p = getPos(e);
  const steps = 6;
  for (let i = 0; i <= steps; i++) reveal(lastX + (p.x - lastX) * i / steps, lastY + (p.y - lastY) * i / steps);
  lastX = p.x; lastY = p.y;
});
gadget.addEventListener('touchstart', e => {
  e.preventDefault(); isDrawing = true;
  const p = getPos(e); lastX = p.x; lastY = p.y; reveal(p.x, p.y);
}, {passive: false});
gadget.addEventListener('touchend', () => isDrawing = false);
gadget.addEventListener('touchmove', e => {
  e.preventDefault(); if (!isDrawing) return;
  const p = getPos(e);
  const steps = 6;
  for (let i = 0; i <= steps; i++) reveal(lastX + (p.x - lastX) * i / steps, lastY + (p.y - lastY) * i / steps);
  lastX = p.x; lastY = p.y;
}, {passive: false});

let resizeTimer;
window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(resize, 120); });
resize();
</script>
